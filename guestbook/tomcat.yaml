apiVersion: v1
kind: Namespace
metadata:
  name: team3-tomcat # 새로운 네임스페이스 생성
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: team3-tomcat
  name: deploy-tomcat
  labels:
    app: deploy-tomcat
spec:
  replicas: 10
  selector:
    matchLabels:
      app: deploy-tomcat
  template:
    metadata:
      labels:
        app: deploy-tomcat
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: name
                    operator: In
                    values:
                      - tomcat
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: deploy-tomcat
      containers:
      - name: tomcat
        image: 635697986322.dkr.ecr.ap-northeast-2.amazonaws.com/team3-ecr:tomcat_v2.0
        resources:
          requests:
            memory: "300Mi"
            cpu: "100m"
          limits:
            memory: "300Mi"
            cpu: "100m"
        ports:
          - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 5
          timeoutSeconds: 1
          failureThreshold: 3
  strategy:
    type: RollingUpdate
    rollingUpdate: 
      maxUnavailable: 1
      maxSurge: 2
---
apiVersion: v1
kind: Service
metadata:
  name: tomcat-svc
  namespace: team3-tomcat
spec:
  selector:
    app: deploy-tomcat
  ports:
    - protocol: TCP
      port: 8080   # Service가 노출하는 포트
      targetPort: 8080 # Pod 내부에서 사용하는 포트
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tomcat-hpa
  namespace: team3-tomcat
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: deploy-tomcat
  minReplicas: 10
  maxReplicas: 50
  metrics:
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 50
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0       # 바로 반응
      policies:
      - type: Percent
        value: 100                         # 한번에 100% 증가 (4 → 8)
        periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 30      # 너무 빠르게 줄이지 않음
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: tomcat-pdb
  namespace: team3-tomcat
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: deploy-tomcat
