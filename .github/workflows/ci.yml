# .github/workflows/ci-java.yml
name: Java & JSP CI

on:
  push:
    paths:
      - '**/*.java'
      - '**/*.jsp'
  pull_request:
    paths:
      - '**/*.java'
      - '**/*.jsp'

jobs:
  compile-and-analyze:
    name: Compile, Test & Code Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      - name: Install servlet API
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libtomcat9-java libeclipse-jdt-core-java

      - name: Install PMD CLI
        run: |
          PMD_VER=6.64.0
          wget -q https://github.com/pmd/pmd/releases/download/pmd_releases/${PMD_VER}/pmd-bin-${PMD_VER}.zip
          unzip -q pmd-bin-${PMD_VER}.zip
          export PMD_HOME=$PWD/pmd-bin-${PMD_VER}
          echo "export PMD_HOME=$PWD/pmd-bin-${PMD_VER}" >> $GITHUB_ENV
          echo "export PATH=$PMD_HOME/bin:$PATH" >> $GITHUB_ENV

      - name: Install SpotBugs CLI
        run: |
          SB_VER=4.7.3
          wget -q https://github.com/spotbugs/spotbugs/releases/download/${SB_VER}/spotbugs-${SB_VER}.zip
          unzip -q spotbugs-${SB_VER}.zip
          export SPOTBUGS_HOME=$PWD/spotbugs-${SB_VER}
          echo "export SPOTBUGS_HOME=$PWD/spotbugs-${SB_VER}" >> $GITHUB_ENV
          echo "export PATH=$SPOTBUGS_HOME/bin:$PATH" >> $GITHUB_ENV

      - name: Compile Java sources
        run: |
          mkdir -p target/classes
          find . -type f -name '*.java' > sources.txt
          export CLASSPATH=/usr/share/java/servlet-api.jar
          javac -encoding UTF-8 -cp $CLASSPATH -d target/classes @sources.txt

      - name: Package WAR
        run: |
          mkdir -p target/webapp/WEB-INF/classes
          cp -r target/classes/* target/webapp/WEB-INF/classes/
          cp -r *.jsp target/webapp/
          cd target/webapp
          jar cvf ../app.war .

      - name: Run Checkstyle
        run: |
          curl -sSL https://raw.githubusercontent.com/checkstyle/checkstyle/master/src/main/resources/google_checks.xml \
            -o google_checks.xml
          find . -name "*.java" > java_files.txt
          checkstyle -c google_checks.xml $(cat java_files.txt)

      - name: Run PMD
        run: |
          pmd -d . -R category/java/bestpractices.xml -f text \
            || (echo 'PMD violations detected' && exit 1)

      - name: Run SpotBugs
        run: |
          spotbugs -textui -effort:max -exitcode target/classes

      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-war
          path: target/app.war